name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build & publish desktop installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS builds are intentionally unsigned (no Apple Developer Program).
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Windows code-signing. Empty = unsigned. See docs/publishing.md.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          # Build-time flag injected via Vite's `define` and consumed by
          # updater-service.ts to gate auto-install on signed Windows only.
          PTT_WIN_SIGNED: ${{ secrets.WIN_CSC_LINK != '' && '1' || '0' }}
        run: pnpm --filter @ptt/desktop run release
